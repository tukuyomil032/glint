name: Release

on:
  push:
    branches:
      - master
      - main
      - dev
  workflow_dispatch:

permissions:
  contents: write

jobs:
  tag:
    runs-on: ubuntu-latest
    outputs:
      created: ${{ steps.tag.outputs.created }}
      tag: ${{ steps.tag.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Create tag from Cargo.toml version
        id: tag
        shell: bash
        run: |
          set -euo pipefail

          VERSION=$(grep -m1 '^version\s*=\s*"' Cargo.toml | sed -E 's/version\s*=\s*"([^"]+)"/\1/')
          if [[ -z "${VERSION}" ]]; then
            echo "Could not read version from Cargo.toml"
            exit 1
          fi

          TAG="v${VERSION}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

          if git rev-parse -q --verify "refs/tags/${TAG}" >/dev/null; then
            echo "Tag already exists: ${TAG}"
            echo "created=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "${TAG}"
          git push origin "${TAG}"

          echo "created=true" >> "$GITHUB_OUTPUT"

  build:
    needs: tag
    if: needs.tag.outputs.created == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-13
            target: x86_64-apple-darwin
            ext: tar.gz
            bin: glint
          - os: macos-14
            target: aarch64-apple-darwin
            ext: tar.gz
            bin: glint
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            ext: zip
            bin: glint.exe
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package (Unix)
        if: matrix.ext == 'tar.gz'
        shell: bash
        run: |
          set -euo pipefail
          TAG="${{ needs.tag.outputs.tag }}"
          NAME="glint-${TAG}-${{ matrix.target }}"
          mkdir -p dist
          cp "target/${{ matrix.target }}/release/${{ matrix.bin }}" "dist/glint"
          chmod +x dist/glint
          tar -C dist -czf "${NAME}.tar.gz" glint

      - name: Package (Windows)
        if: matrix.ext == 'zip'
        shell: pwsh
        run: |
          $tag = "${{ needs.tag.outputs.tag }}"
          $name = "glint-$tag-${{ matrix.target }}"
          New-Item -ItemType Directory -Path dist -Force | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/${{ matrix.bin }}" "dist/glint.exe"
          Compress-Archive -Path "dist/glint.exe" -DestinationPath "$name.zip" -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: glint-${{ matrix.target }}
          path: |
            *.tar.gz
            *.zip

  release:
    runs-on: ubuntu-latest
    needs: [tag, build]
    if: needs.tag.outputs.created == 'true'
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v5
        with:
          path: dist

      - name: Generate checksums
        shell: bash
        run: |
          set -euo pipefail
          find dist -type f \( -name '*.tar.gz' -o -name '*.zip' \) -print0 | sort -z | xargs -0 sha256sum > dist/SHA256SUMS.txt

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.tag.outputs.tag }}
          generate_release_notes: true
          files: |
            dist/**/*.tar.gz
            dist/**/*.zip
            dist/SHA256SUMS.txt
